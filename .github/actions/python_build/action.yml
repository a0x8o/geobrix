name: build geobrix python
description: build geobrix python
# Shares env with scala_build (apt + pip). When run after scala_build in same job, caches are warm.
inputs:
  run_lint:
    description: 'Run Python lint (isort, black, flake8) and fail build on errors? true or false. Typically true only for PRs targeting main.'
    default: 'false'
  enable_coverage:
    description: 'Run pytest with coverage (--cov) and emit coverage.xml for Codecov? true or false.'
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Configure python interpreter
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        cache: 'pip'
        cache-dependency-path: '.ci-pip-cache-key'
        python-version: ${{ matrix.python }}
    # Route pip through JFrog (OIDC) per go/hardened-gha policy.
    # Idempotent if scala_build already ran in the same job (re-auths but env vars stay set).
    # Caller job must declare `permissions: id-token: write`.
    - name: Authenticate for JFrog (pip via OIDC)
      uses: ./.github/actions/jfrog-auth
    - name: Add packaged GDAL dependencies
      shell: bash
      run: |
        # - restore apt cache from workspace (workflow caches .cache/apt-archives; same key as scala_build)
        mkdir -p .cache/apt-archives
        if [ -n "$(ls -A .cache/apt-archives 2>/dev/null)" ]; then
          sudo cp -n .cache/apt-archives/*.deb /var/cache/apt/archives/ 2>/dev/null || true
        fi
        # - update apt
        sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-backports main universe multiverse restricted"
        sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-updates main universe multiverse restricted"
        sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-security main multiverse restricted universe"
        sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc) main multiverse restricted universe"
        # - add ubuntugis PPA with fingerprint-pinned GPG key. We refuse the
        #   PPA unless the vendored key in scripts/security/keys/ matches the
        #   expected fingerprint, so a swapped/tampered key file fails the
        #   build before any GDAL package gets installed through it.
        sudo apt-get install -y software-properties-common gpg
        ./scripts/security/apt-add-ubuntugis-ppa
        # - install natives. GDAL packages exact-pinned to a single ubuntugis-unstable
        #   build to keep CI deterministic against PPA drift. Bump GDAL_PPA_VERSION in
        #   lockstep with matrix.gdal across action.yml files. Find current version at
        #   https://launchpad.net/~ubuntugis/+archive/ubuntu/ubuntugis-unstable/+packages
        GDAL_PPA_VERSION="3.11.4+dfsg-1~noble0"
        sudo apt-get -o DPkg::Lock::Timeout=-1 install -y unixodbc libcurl3-gnutls libsnappy-dev libopenjp2-7
        sudo apt-get -o DPkg::Lock::Timeout=-1 install -y \
          "libgdal-dev=${GDAL_PPA_VERSION}" \
          "gdal-bin=${GDAL_PPA_VERSION}" \
          "python3-gdal=${GDAL_PPA_VERSION}"
        # - save apt archives for next run (workflow caches .cache/apt-archives)
        sudo cp -n /var/cache/apt/archives/*.deb .cache/apt-archives/ 2>/dev/null || true
    - name: Install python dependencies (hash-pinned via requirements-ci.txt)
      shell: bash
      run: |
        # Bootstrap pip itself to a known version (must come before --require-hashes).
        # pip ships with the actions/setup-python tool-cache Python, which is
        # itself hash-pinned by setup-python's release manifest.
        pip install --upgrade pip==25.0.1
        # Now consume the hash-pinned lockfile. Every transitive dep is locked
        # with sha256; pip refuses to install if a hash doesn't match.
        # Regenerate via: uv pip compile --generate-hashes python/geobrix/requirements-ci.in
        pip install --require-hashes -r python/geobrix/requirements-ci.txt
        # GDAL is the one --require-hashes exception: the Python binding
        # version must match the apt-installed libgdal (pinned by
        # GDAL_PPA_VERSION above and signed by the fingerprint-pinned
        # ubuntugis key), so the version is dynamic and can't live in a
        # static lockfile. --no-binary :all: forces pip to fetch the sdist
        # and compile it against those verified headers, instead of taking
        # whatever pre-built manylinux wheel PyPI serves. Residual risk:
        # the sdist's Python wrapper code itself is not byte-verified.
        # --no-build-isolation reuses the host's setuptools so build
        # bootstrapping stays inside the hash-pinned closure above.
        export GDAL_CONFIG=/usr/bin/gdal-config
        INSTALLED_GDAL_VERSION=$(gdal-config --version)
        echo "System GDAL version: ${INSTALLED_GDAL_VERSION}"
        echo "Matrix GDAL version: ${{ matrix.gdal }}"
        GDAL_VERSION_TO_INSTALL="${INSTALLED_GDAL_VERSION:-${{ matrix.gdal }}}"
        pip install --no-build-isolation --no-binary :all: gdal[numpy]==${GDAL_VERSION_TO_INSTALL}
        # Install the in-repo geobrix package (no extras — dev/test deps are
        # already locked in requirements-ci.txt).
        pip install --no-deps python/geobrix
    - name: Lint Python (isort, black, flake8)
      if: inputs.run_lint == 'true'
      shell: bash
      run: |
        cd python/geobrix
        isort --check-only src test
        black --check src test
        flake8 src test
    - name: Give Python interpreter write access to checkpointing / raster write location
      shell: bash
      run: |
        # does this need to be '/mnt/tmp/raster-checkpoint'?
        sudo mkdir -p /tmp/raster-checkpoint
        sudo chmod -R 777 /tmp/raster-checkpoint
        # Create GDAL temp directory for NodeFilePathUtil
        sudo mkdir -p /tmp/gdal_local_files
        sudo chmod -R 777 /tmp/gdal_local_files
    - name: Test and build python package
      shell: bash
      run: |
        cd python/geobrix
        python -m build
        # pytest-cov is already locked in requirements-ci.txt; no extra install needed.
        if [ "${{ inputs.enable_coverage }}" = "true" ]; then
          pytest -m "not integration" --cov=src --cov-report=xml --cov-report=term --cov-config=pyproject.toml -q
        else
          pytest -m "not integration"
        fi
    - name: Copy python artifacts to GH Actions run
      shell: bash
      run: cp python/geobrix/dist/*.whl staging/build-artifacts
