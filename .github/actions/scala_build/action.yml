name: build geobrix scala
description: build geobrix scala
# Shares env with python_build (apt + pip). When run before python_build in same job, caches are warm.
inputs:
  skip_tests:
    description: 'Skip Scala Tests? true or false'
    default: 'false'
  enable_coverage:
    description: 'Enable code coverage with scoverage? true or false'
    default: 'false'
  fail_on_scalastyle:
    description: 'Fail build on ScalaStyle errors? true or false. Typically true only for PRs targeting main.'
    default: 'false'
  suite_pattern:
    description: 'Optional -Dsuites= value (e.g. com.databricks.labs.gbx.rasterx.*). If empty, uses com.databricks.labs.gbx.*'
    default: ''
runs:
  using: "composite"
  steps:
        - name: Configure JDK
          uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
          with:
            java-version: '17'
            distribution: 'zulu'
            cache: 'maven'
            cache-dependency-path: 'pom.xml'
        - name: Set Maven opts for coverage and parallel builds
          shell: bash
          run: echo "MAVEN_OPTS=-Xmx4g -XX:+UseG1GC" >> $GITHUB_ENV
        - name: Configure python interpreter
          uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
          with:
            cache: 'pip' # caches dependencies for faster subsequent runs
            cache-dependency-path: '.ci-pip-cache-key'
            python-version: ${{ matrix.python }}
        # Route pip + Maven through JFrog (OIDC) per go/hardened-gha policy.
        # Must run after setup-java + setup-python so mvn + pip3 are on PATH for auto-detect.
        # Caller job must declare `permissions: id-token: write`.
        - name: Authenticate for JFrog (pip + Maven via OIDC)
          uses: ./.github/actions/jfrog-auth
        # Verify the PGP signature of every Maven dependency / plugin against
        # .maven-keys.list BEFORE any other mvn call resolves or compiles them.
        # This is the "verify before use" gate — if Maven Central / the JFrog
        # mirror ever serves an artifact signed by a key not in the keysmap,
        # the build stops here, before the bytes touch any test or compile.
        # Runs in ~20s; cost is amortized against the 10-15 min build.
        - name: Verify Maven dependency PGP signatures
          shell: bash
          run: ./scripts/security/maven-pgp-verify
        - name: Add packaged GDAL dependencies
          shell: bash
          run : |
            # - restore apt cache from workspace (populated by actions/cache in workflow)
            mkdir -p .cache/apt-archives
            if [ -n "$(ls -A .cache/apt-archives 2>/dev/null)" ]; then
              sudo cp -n .cache/apt-archives/*.deb /var/cache/apt/archives/ 2>/dev/null || true
            fi
            # - update apt
            sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-backports main universe multiverse restricted"
            sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-updates main universe multiverse restricted"
            sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-security main multiverse restricted universe"
            sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc) main multiverse restricted universe"
            # - add ubuntugis PPA with GPG key
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y ppa:ubuntugis/ubuntugis-unstable
            sudo apt-get update -y
            # - install natives. GDAL packages exact-pinned to a single ubuntugis-unstable
            #   build to keep CI deterministic against PPA drift. Bump GDAL_PPA_VERSION in
            #   lockstep with matrix.gdal across action.yml files. Find current version at
            #   https://launchpad.net/~ubuntugis/+archive/ubuntu/ubuntugis-unstable/+packages
            GDAL_PPA_VERSION="3.11.4+dfsg-1~noble0"
            sudo apt-get -o DPkg::Lock::Timeout=-1 install -y unixodbc libcurl3-gnutls libsnappy-dev libopenjp2-7
            sudo apt-get -o DPkg::Lock::Timeout=-1 install -y \
              "libgdal-dev=${GDAL_PPA_VERSION}" \
              "gdal-bin=${GDAL_PPA_VERSION}" \
              "python3-gdal=${GDAL_PPA_VERSION}" \
              zip unzip
            # - install pip packages via hash-pinned lockfile (python/geobrix/requirements-ci.txt).
            #   Every transitive dep is sha256-verified; pip refuses to install on mismatch.
            #   Regenerate via: uv pip compile --generate-hashes python/geobrix/requirements-ci.in
            pip install --upgrade pip==25.0.1
            pip install --require-hashes -r python/geobrix/requirements-ci.txt
            # GDAL is the one exception: the wheel must match the system's
            # apt-installed native, which is version-pinned by GDAL_PPA_VERSION
            # above. We detect it and install at that version, NOT from the lockfile.
            export GDAL_CONFIG=/usr/bin/gdal-config
            INSTALLED_GDAL_VERSION=$(gdal-config --version)
            echo "System GDAL version: ${INSTALLED_GDAL_VERSION}"
            echo "Matrix GDAL version: ${{ matrix.gdal }}"
            GDAL_VERSION_TO_INSTALL="${INSTALLED_GDAL_VERSION:-${{ matrix.gdal }}}"
            pip install --no-build-isolation gdal[numpy]==${GDAL_VERSION_TO_INSTALL}
            # - add the so files
            sudo cp scripts/gdal311/libgdalalljni.so /usr/lib/libgdalalljni.so
            # - save apt archives for next run (workflow caches .cache/apt-archives)
            sudo cp -n /var/cache/apt/archives/*.deb .cache/apt-archives/ 2>/dev/null || true
        # With coverage: 3-step flow. When suite_pattern is set (e.g. parallel-by-package CI), skip report-only and package (caller will merge and upload).
        - name: Test and build the scala JAR - skip tests is false, coverage enabled
          if: inputs.skip_tests == 'false' && inputs.enable_coverage == 'true'
          shell: bash
          run: |
            SUITES="${{ inputs.suite_pattern }}"
            [ -z "$SUITES" ] && SUITES="com.databricks.labs.gbx.*"
            # -C: strict-checksums — fail (not warn) on artifact checksum mismatch.
            mvn -T 1C -C -q clean scoverage:test -Dsuites="$SUITES" -Dscalastyle.fail=${{ inputs.fail_on_scalastyle }} -Druntime=large
            if [ -z "${{ inputs.suite_pattern }}" ]; then
              mvn -C -q scoverage:report-only -Dscoverage.aggregate=true -Dscoverage.aggregateOnly=true -Druntime=large
              mvn -C -q package -DskipTests -Dscoverage.skip -Dscalastyle.fail=${{ inputs.fail_on_scalastyle }}
            fi
        - name: Print Scala coverage summary
          if: inputs.skip_tests == 'false' && inputs.enable_coverage == 'true' && inputs.suite_pattern == ''
          shell: bash
          run: |
            if [ -f target/scoverage.xml ]; then
              # awk (not `sed | head -1`): scoverage.xml has multiple matching
              # lines and `head -1` closes the pipe, sending sed SIGPIPE 141.
              # Under GHA's default `bash -eo pipefail`, that fails the step.
              rate=$(awk 'match($0, /statement-rate="[^"]*"/) { v=substr($0, RSTART+16, RLENGTH-17); print v; exit }' target/scoverage.xml)
              inv=$(awk 'match($0, /statements-invoked="[^"]*"/) { v=substr($0, RSTART+20, RLENGTH-21); print v; exit }' target/scoverage.xml)
              tot=$(awk 'match($0, /statement-count="[^"]*"/) { v=substr($0, RSTART+17, RLENGTH-18); print v; exit }' target/scoverage.xml)
              echo ""
              echo "============================== Scala coverage ==============================="
              echo "Scala coverage: ${rate}% (${inv}/${tot} statements)"
              echo "=============================================================================="
            fi
        - name: Test and build the scala JAR - skip tests is false, coverage disabled
          if: inputs.skip_tests == 'false' && inputs.enable_coverage == 'false'
          shell: bash
          run: |
            SUITES="${{ inputs.suite_pattern }}"
            [ -z "$SUITES" ] && SUITES="com.databricks.labs.gbx.*"
            mvn -T 1C -C -q clean install -Dscoverage.skip -Dsuites="$SUITES" -Dscalastyle.fail=${{ inputs.fail_on_scalastyle }}
        - name: Build the scala JAR - skip tests is true
          if: inputs.skip_tests == 'true'
          shell: bash
          run: mvn -C -q clean install -DskipTests -Dscoverage.skip -Dscalastyle.fail=${{ inputs.fail_on_scalastyle }}
        - name: Copy build artifacts to local staging
          if: inputs.suite_pattern == ''
          shell: bash
          run: |
            # add .jar + .so
            mkdir -p staging/build-artifacts
            cp target/geobrix*.jar staging/build-artifacts
            cp scripts/gdal311/libgdalalljni.so staging/build-artifacts
        - name: Copy user artifacts local staging
          if: inputs.suite_pattern == ''
          shell: bash
          run: |
            # add zipped resources (for now)
            mkdir -p staging/user-artifacts
            cp resources/static/geobrix-docs-*.zip staging/user-artifacts 2>/dev/null || true
