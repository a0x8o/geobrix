name: build geobrix pyrx (lightweight)
description: >
  Build and test the lightweight, JAR-free raster API (pyrx). Unlike
  scala_build / python_build this installs NO Scala JAR and NO apt/native GDAL —
  pyrx runs on rasterio's bundled GDAL (the same path that works on Serverless,
  shared clusters, and ARM). It needs only a JVM (pyspark local mode) plus the
  pure-Python geobrix[pyrx] extra. Kept fast and isolated so it can gate the
  heavyweight build (fail-fast).
inputs:
  python_version:
    description: 'Python version (matches the job matrix).'
    default: '3.12.3'
runs:
  using: "composite"
  steps:
    # pyspark local mode needs a JVM even though pyrx never builds/loads the JAR.
    - name: Configure JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        java-version: '17'
        distribution: 'zulu'
    # Pre-route pip at db-pypi BEFORE actions/setup-python runs (its bundled
    # "pip install --upgrade pip" otherwise hits the blocked pypi.org egress on
    # the hardened runner). Same pattern as scala_build / python_build.
    - name: Pre-bootstrap pip for JFrog (pre-setup-python)
      uses: ./.github/actions/jfrog-pip-bootstrap
    - name: Configure python interpreter
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        cache: 'pip'
        cache-dependency-path: '.ci-pip-cache-key'
        python-version: ${{ inputs.python_version }}
    - name: Authenticate for JFrog (pip via OIDC)
      uses: ./.github/actions/jfrog-auth
    - name: Install pyrx deps (hash-pinned) + package
      shell: bash
      run: |
        # Bootstrap pip itself to a known version before --require-hashes.
        pip install --upgrade pip==25.0.1
        # Hash-pinned supply chain (matches requirements-ci.txt / dev-container
        # discipline; see docs/docs/security.mdx): every wheel is sha256-verified,
        # so a compromised mirror serving same-version-different-bytes fails closed.
        # Regenerate via: uv pip compile --generate-hashes python/geobrix/requirements-pyrx-ci.in
        # No GDAL exception here — rasterio's bundled-GDAL binary wheel is pinned
        # in the lock too (the lightweight API installs no native GDAL, no JAR).
        pip install --require-hashes -r python/geobrix/requirements-pyrx-ci.txt
        # Install the in-repo package itself with --no-deps; every dependency is
        # already in the hash-pinned closure above.
        pip install --no-deps python/geobrix
        python -c "import rasterio, pyarrow, pandas, shapely; print('rasterio', rasterio.__version__, 'gdal', rasterio.__gdal_version__, 'pyarrow', pyarrow.__version__, 'pandas', pandas.__version__)"
    - name: Build lightweight wheel
      shell: bash
      run: |
        cd python/geobrix
        python -m build
    - name: Run pyrx tests (no JAR)
      shell: bash
      run: |
        cd python/geobrix
        # pyproject sets pythonpath=["src"]; exclude integration (network) tests.
        # test/ds = lightweight DataSource readers/writer + the tiled-output
        # framework (raster_gbx/gtiff_gbx/pmtiles_gbx); same light-dep set as pyrx.
        pytest test/pyrx test/ds test/pyvx -m "not integration" -v
