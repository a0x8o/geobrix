name: build geobrix pyrx (lightweight)
description: >
  Build and test the lightweight, JAR-free raster API (pyrx). Unlike
  scala_build / python_build this installs NO Scala JAR and NO apt/native GDAL —
  pyrx runs on rasterio's bundled GDAL (the same path that works on Serverless,
  shared clusters, and ARM). It needs only a JVM (pyspark local mode) plus the
  pure-Python geobrix[pyrx] extra. Kept fast and isolated so it can gate the
  heavyweight build (fail-fast).
inputs:
  python_version:
    description: 'Python version (matches the job matrix).'
    default: '3.12.3'
runs:
  using: "composite"
  steps:
    # pyspark local mode needs a JVM even though pyrx never builds/loads the JAR.
    - name: Configure JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        java-version: '17'
        distribution: 'zulu'
    # Pre-route pip at db-pypi BEFORE actions/setup-python runs (its bundled
    # "pip install --upgrade pip" otherwise hits the blocked pypi.org egress on
    # the hardened runner). Same pattern as scala_build / python_build.
    - name: Pre-bootstrap pip for JFrog (pre-setup-python)
      uses: ./.github/actions/jfrog-pip-bootstrap
    - name: Configure python interpreter
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        cache: 'pip'
        cache-dependency-path: '.ci-pip-cache-key'
        python-version: ${{ inputs.python_version }}
    - name: Authenticate for JFrog (pip via OIDC)
      uses: ./.github/actions/jfrog-auth
    - name: Install pyrx (lightweight extra, no JAR / no apt GDAL)
      shell: bash
      run: |
        pip install --upgrade pip==25.0.1
        # build backend for the wheel build below.
        pip install build==1.4.4
        # Install the in-repo package with the pyrx + test extras. This pulls the
        # rasterio binary wheel (bundled GDAL), shapely, numpy, pyarrow, pytest,
        # and pyspark — all from the JFrog db-pypi mirror. No native GDAL, no JAR.
        # NOTE (pre-main hardening): convert this to a --require-hashes lock
        # (python/geobrix/requirements-pyrx-ci.txt via `uv pip compile`) before
        # this job gates merges into main, to match scala_build/python_build.
        pip install "./python/geobrix[pyrx,test]"
        python -c "import rasterio, pyarrow, shapely; print('rasterio', rasterio.__version__, 'gdal', rasterio.__gdal_version__, 'pyarrow', pyarrow.__version__)"
    - name: Build lightweight wheel
      shell: bash
      run: |
        cd python/geobrix
        python -m build
    - name: Run pyrx tests (no JAR)
      shell: bash
      run: |
        cd python/geobrix
        # pyproject sets pythonpath=["src"]; exclude integration (network) tests.
        pytest test/pyrx -m "not integration" -v
