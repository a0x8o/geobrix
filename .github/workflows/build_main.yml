name: build main
# Runs on: push to any branch (except python/** and scala/**), all PRs, and manual trigger.
# Scala doc tests are excluded from the main Scala run; they run in a separate step only on push to master.
# Manual run: Actions → "build main" → Run workflow (workflow_dispatch).
#
# Use runs-on: larger for all jobs (ubuntu-latest gets 403 on actions/checkout for private repo).
on:
  push:
    branches-ignore:
      - "python/**"
      - "scala/**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  # Regenerate doc-snippet-inventory and push to the PR branch (not master). Only for PRs targeting master.
  update-doc-inventory:
    runs-on: larger
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    # Scoped to protected env so REPO_ACCESS_TOKEN is only available to approved workflow runs.
    environment: runtime
    permissions:
      # Needed to push the regenerated inventory back onto the PR head branch.
      contents: write
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
      - name: Rebuild doc-snippet-inventory
        run: python3 scripts/ci/inventory-doc-snippets.py
      - name: Commit and push if inventory changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/doc-snippet-inventory.json
          git diff --staged --quiet && echo "No changes to doc-snippet-inventory.json" && exit 0
          git commit -m "chore(docs): rebuild doc-snippet-inventory.json [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
  build:
    runs-on: larger
    # Checkout uses REPO_ACCESS_TOKEN (non-exempt secret), so gate behind the protected env.
    environment: runtime
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        python: [ 3.12.3 ]
        pytest: [8.4.2]
        numpy: [ 2.1.3 ]
        gdal: [ 3.11.4 ]
        spark: [ 4.0.0 ]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Create pip cache key file
        run: |
          echo "${{ github.ref }}-${{ matrix.python }}-${{ matrix.numpy }}-${{ matrix.spark }}-${{ matrix.gdal }}" > .ci-pip-cache-key
      - name: Cache apt packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: .cache/apt-archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/actions/scala_build/action.yml', '.github/actions/python_build/action.yml') }}
      - name: build scala
        uses: ./.github/actions/scala_build
        with:
          # Disable scoverage in main build to keep CI ~10–15 min (full Scala coverage is ~30+ min). Run "Upload coverage to Codecov" workflow manually for Scala+Python coverage.
          enable_coverage: "false"
          fail_on_scalastyle: ${{ github.event_name == 'pull_request' && github.base_ref == 'master' }}
      - name: build python
        uses: ./.github/actions/python_build
        with:
          run_lint: ${{ github.event_name == 'pull_request' && github.base_ref == 'master' }}
          enable_coverage: "true"
      - name: Rebuild doc-snippet-inventory
        run: python3 scripts/ci/inventory-doc-snippets.py
      # Disabled until project launch. Re-enable by restoring the condition below.
      - name: Scala doc tests (master only, after everything else)
        if: false  # Disabled until project launch
        env:
          GBX_SAMPLE_DATA_ROOT: ${{ runner.temp }}/geobrix-sample-data
        run: |
          mkdir -p "$GBX_SAMPLE_DATA_ROOT"
          sudo -E mvn -q test -Dsuites='tests.docs.scala.*,docs.tests.scala.*' -DfailIfNoTests=false -Dscoverage.skip
      - name: Stage coverage for upload job
        run: |
          mkdir -p coverage-reports
          cp -f target/scoverage.xml coverage-reports/ 2>/dev/null || true
          cp -f target/scoverage-report/scoverage.xml coverage-reports/scoverage-report.xml 2>/dev/null || true
          cp -f python/geobrix/coverage.xml coverage-reports/ 2>/dev/null || true
          if [ -z "$(ls -A coverage-reports 2>/dev/null)" ]; then
            echo "No coverage files found. Expected Scala: target/scoverage.xml or target/scoverage-report/scoverage.xml; Python: python/geobrix/coverage.xml"
            exit 1
          fi
          ls -la coverage-reports/
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-reports
          path: coverage-reports
          if-no-files-found: warn
      - name: upload artifacts
        uses: ./.github/actions/upload_artifacts

  codecov:
    name: Upload to Codecov
    runs-on: larger
    needs: build
    if: always() && needs.build.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: coverage-reports
          path: coverage-reports
      - name: Upload to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage-reports
          fail_ci_if_error: false
