name: Publish package to GitHub Packages
#
# DISABLED per Databricks Labs Repository Lockdown policy.
# GeoBrix is not publishing packages from GitHub Actions at this time; Maven artifact
# distribution (if/when re-enabled) will be reviewed with Labs first.
#
# To re-enable: remove the `if: false` on the `publish` job below and coordinate with
# databrickslabs maintainers to restore the `release` trigger and required secrets.
on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  publish:
    if: false  # Disabled per Labs lockdown policy — see banner above.
    runs-on: larger
    # Checkout uses REPO_ACCESS_TOKEN (non-exempt secret), so gate behind the protected env.
    environment: runtime
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Publish package
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}