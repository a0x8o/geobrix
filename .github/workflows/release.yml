name: publish python package to pypi
#
# DISABLED per Databricks Labs Repository Lockdown policy.
# GeoBrix is not publishing to PyPI from GitHub Actions at this time; PyPI release
# automation (if/when re-enabled) will be reviewed with Labs first.
#
# To re-enable: remove the `if: false` on the `build-n-publish` job below and coordinate
# with databrickslabs maintainers to restore the `release` trigger and required secrets.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-n-publish:
    if: false  # Disabled per Labs lockdown policy — see banner above.
    name: Build project and publish to PyPI
    runs-on: larger
    # Use the single protected env `runtime` so REPO_ACCESS_TOKEN / OIDC issuance are gated.
    environment: runtime
    permissions:
      # Used to authenticate to PyPI via OIDC and sign the release's artifacts with sigstore-python.
      id-token: write
      # Used to attach signing artifacts to the published release.
      contents: write
    strategy:
      matrix:
        python: [ 3.12.3 ]
        pytest: [8.4.2]
        numpy: [ 2.1.3 ]
        gdal: [ 3.11.4 ]
        spark: [ 4.0.0 ]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Create pip cache key file
        run: |
          echo "${{ github.ref }}-${{ matrix.python }}-${{ matrix.numpy }}-${{ matrix.spark }}-${{ matrix.gdal }}" > .ci-pip-cache-key
      - name: Cache apt packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: .cache/apt-archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/actions/scala_build/action.yml', '.github/actions/python_build/action.yml') }}
      - name: build scala
        uses: ./.github/actions/scala_build
      - name: build python
        uses: ./.github/actions/python_build

      # As of DEC, 2025 v1 is the latest
      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          packages_dir: python/geobrix/dist/
