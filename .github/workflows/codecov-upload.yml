# Manual workflow: run tests with coverage and upload to Codecov.
# Use only when you need to refresh the badge without a new push; build_main already
# runs tests once and uploads to Codecov in a separate job (no double test run).
#
# Trigger: Actions → "Upload coverage to Codecov" → Run workflow.
#
# Requirements:
#   - Repo secret CODECOV_TOKEN (from https://codecov.io/gh/databrickslabs/geobrix → Settings).
#
# Badge: README uses https://codecov.io/gh/databrickslabs/geobrix/branch/main/graph/badge.svg

name: Upload coverage to Codecov

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  coverage:
    name: Build, test with coverage, upload
    # Heavy: full Scala scoverage + Python pytest --cov + GDAL native install (manual coverage-refresh path). Same workload as build_main, so same runner class.
    runs-on:
      group: larger-runners
      labels: larger
    # Checkout uses REPO_ACCESS_TOKEN (non-exempt secret), so gate behind the protected env.
    environment: runtime
    permissions:
      contents: read
      # Required by .github/actions/jfrog-auth: GitHub OIDC token exchange for pip/Maven via JFrog.
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        python: [ 3.12.3 ]
        pytest: [8.4.2]
        numpy: [ 2.1.3 ]
        gdal: [ 3.11.4 ]
        spark: [ 4.0.0 ]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create pip cache key file
        run: |
          echo "${{ github.ref }}-${{ matrix.python }}-${{ matrix.numpy }}-${{ matrix.spark }}-${{ matrix.gdal }}" > .ci-pip-cache-key

      - name: Cache apt packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: .cache/apt-archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/actions/scala_build/action.yml', '.github/actions/python_build/action.yml') }}

      - name: Build Scala (with coverage)
        uses: ./.github/actions/scala_build
        with:
          enable_coverage: "true"
          fail_on_scalastyle: "false"

      - name: Build Python (with coverage)
        uses: ./.github/actions/python_build
        with:
          run_lint: "false"
          enable_coverage: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/scoverage.xml,target/scoverage-report/scoverage.xml,python/geobrix/coverage.xml
          fail_ci_if_error: false
